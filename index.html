<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber-Chain NFT Miner</title>
    <!-- Telegram Web App Script laden -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            font-family: 'Courier New', monospace; 
            overflow: hidden;
            touch-action: none;
        }
        .header {
            width: 100%;
            padding: 10px;
            text-align: center;
            background: #111;
            border-bottom: 2px solid #f7931a;
            box-shadow: 0 4px 10px rgba(247, 147, 26, 0.3);
        }
        canvas { 
            border: 2px solid #00ff41; 
            background: #000; 
            box-shadow: 0 0 20px #00ff41; 
            margin-top: 20px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #f7931a;
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        #glitch-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 255, 0.15);
            display: none;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="glitch-overlay"></div>
    <div class="header">
        <div>💰 BITCOINS: <span id="score">0</span></div>
        <div style="color: #f7931a; font-size: 0.8em;">NFTs MINED: <span id="nft-count">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button onclick="toggleAuto()">Autopilot: <span id="auto-status">AUS</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // App auf volle Größe bringen

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const nftEl = document.getElementById('nft-count');
        const overlay = document.getElementById('glitch-overlay');

        const grid = 20;
        let snake = [{x: 100, y: 100}];
        let food = {x: 200, y: 200};
        let dx = grid, dy = 0;
        let score = 0, nfts = 0, auto = false;

        // Canvas an Bildschirm anpassen
        canvas.width = Math.floor((window.innerWidth * 0.9) / grid) * grid;
        canvas.height = canvas.width;

        function main() {
            if (auto) doAutopilot();
            
            setTimeout(function onTick() {
                draw();
                main();
            }, 100);
        }

        function draw() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Kollision mit Wand
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return reset();
            }

            snake.unshift(head);

            // Essen finden
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.innerText = score;
                if (score % 5 === 0) sendNFT();
                spawnFood();
            } else {
                snake.pop();
            }

            // Spielfeld zeichnen
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Snake zeichnen (Bitcoin Style)
            ctx.fillStyle = '#f7931a';
            snake.forEach(p => ctx.fillRect(p.x, p.y, grid - 2, grid - 2));

            // Essen zeichnen (Pixel Bit)
            ctx.fillStyle = '#00ff41';
            ctx.fillRect(food.x, food.y, grid - 2, grid - 2);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
            food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
        }

        function sendNFT() {
            nfts++;
            nftEl.innerText = nfts;
            
            // Glitch Effekt
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.display = 'none', 150);

            // Daten generieren
            const nftData = {
                type: "NFT_GENERATED",
                id: "BIT-NFT-" + Math.floor(Math.random() * 9999),
                pixelCode: btoa(Math.random().toString()).substring(0, 12)
            };

            // DATEN AN BOT SENDEN
            tg.sendData(JSON.stringify(nftData));
        }

        function doAutopilot() {
            if (snake[0].x < food.x && dx === 0) { dx = grid; dy = 0; }
            else if (snake[0].x > food.x && dx === 0) { dx = -grid; dy = 0; }
            else if (snake[0].y < food.y && dy === 0) { dx = 0; dy = grid; }
            else if (snake[0].y > food.y && dy === 0) { dx = 0; dy = -grid; }
        }

        function toggleAuto() {
            auto = !auto;
            document.getElementById('auto-status').innerText = auto ? "AN" : "AUS";
        }

        function reset() {
            snake = [{x: 100, y: 100}];
            dx = grid; dy = 0; score = 0; scoreEl.innerText = "0";
        }

        // Touch-Steuerung
        let startX, startY;
        canvas.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', e => {
            const diffX = e.changedTouches[0].clientX - startX;
            const diffY = e.changedTouches[0].clientY - startY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = grid; dy = 0; }
                else if (diffX < 0 && dx === 0) { dx = -grid; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = grid; }
                else if (diffY < 0 && dy === 0) { dx = 0; dy = -grid; }
            }
        });

        spawnFood();
        main();
    </script>
</body>
</html>
