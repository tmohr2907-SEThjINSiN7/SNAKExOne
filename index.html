<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Bitcoin Miner</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { border: 2px solid #f7931a; background: #000; margin-top: 20px; touch-action: none; }
        .stats { padding: 10px; font-size: 1.2rem; }
        .controls { margin-top: 10px; }
        button { padding: 10px 20px; background: #f7931a; border: none; color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="stats">Bitcoins: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <button onclick="toggleAutoplay()">Autoplay: <span id="autoStatus">OFF</span></button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        const gridSize = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 1, dy = 0;
        let score = 0;
        let autoplay = false;

        // Anpassung an Bildschirmgröße
        canvas.width = Math.floor((window.innerWidth * 0.9) / gridSize) * gridSize;
        canvas.height = canvas.width;

        function draw() {
            if (autoplay) doAutoplay();
            
            // Move Snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall Collision
            if (head.x < 0 || head.x >= canvas.width/gridSize || head.y < 0 || head.y >= canvas.height/gridSize) {
                resetGame(); return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            render();
        }

        function render() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#f7931a"; // Bitcoin Gold
            snake.forEach(p => ctx.fillRect(p.x * gridSize, p.y * gridSize, gridSize-2, gridSize-2));
            
            ctx.fillStyle = "#00ff00"; // "Bit" Food
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };
        }

        // Einfache Autoplay-Logik (folgt dem Food)
        function doAutoplay() {
            if (snake[0].x < food.x && dx !== -1) { dx = 1; dy = 0; }
            else if (snake[0].x > food.x && dx !== 1) { dx = -1; dy = 0; }
            else if (snake[0].y < food.y && dy !== -1) { dx = 0; dy = 1; }
            else if (snake[0].y > food.y && dy !== 1) { dx = 0; dy = -1; }
        }

        function toggleAutoplay() {
            autoplay = !autoplay;
            document.getElementById("autoStatus").innerText = autoplay ? "ON" : "OFF";
        }

        // Touch Steuerung
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', e => {
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; } else if (dx === 0) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; } else if (dy === 0) { dx = 0; dy = -1; }
            }
        });

        function resetGame() { snake = [{x: 10, y: 10}]; score = 0; scoreEl.innerText = score; dx = 1; dy = 0; }
        setInterval(draw, 100);
    </script>
</body>
</html>
